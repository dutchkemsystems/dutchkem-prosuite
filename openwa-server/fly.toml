# fly.toml — Dutchkem OpenWA Server (Admin Session)
# Deploy with: fly deploy --config fly.toml --app dutchkem-openwa-admin

app = "dutchkem-openwa-admin"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  CONVEX_URL = "https://warmhearted-aardvark-280.convex.cloud"
  SESSION_TYPE = "admin"
  POLL_INTERVAL_MS = "3000"
  NODE_ENV = "production"

# Persistent volume for WhatsApp auth state (QR scan data)
[mounts]
  source = "openwa_auth_admin"
  destination = "/app/auth_admin"

[http_service]
  internal_port = 2785
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
